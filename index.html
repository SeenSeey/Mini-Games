<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>A-Frame Mini Game – Dodge Blocks</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.4/dist/aframe-physics-system.min.js"></script>

<style>
* { -webkit-tap-highlight-color: transparent; }

body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: system-ui;
}

/* ── Overlay при старте ── */
#audio-unlock-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  cursor: pointer;
}
#audio-unlock-overlay p {
  color: white;
  font-size: 1.2rem;
  text-align: center;
}

/* ── Контейнер кнопок управления ── */
#touch-controls {
  position: fixed;
  bottom: 28px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 24px;
  z-index: 8888;
  pointer-events: none;
}

/* Каждая кнопка */
.ctrl-btn {
  pointer-events: all;
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.12);
  border: 2.5px solid rgba(255, 255, 255, 0.45);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.4rem;
  color: rgba(255, 255, 255, 0.9);
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.08s, transform 0.08s, border-color 0.08s;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}

.ctrl-btn:active,
.ctrl-btn.pressed {
  background: rgba(255, 235, 59, 0.35);
  border-color: rgba(255, 235, 59, 0.9);
  transform: scale(0.92);
  color: #ffeb3b;
}
</style>

<script>
// ──────────────────────────────────────────────
// AUDIO UNLOCK
// ──────────────────────────────────────────────
function setupAudioUnlock() {
  const overlay = document.getElementById("audio-unlock-overlay");
  function unlock() {
    overlay.style.display = "none";
    const scene = document.querySelector("a-scene");
    if (scene && scene.audioContext) scene.audioContext.resume();
  }
  window.addEventListener("click",      unlock, { once: true });
  window.addEventListener("keydown",    unlock, { once: true });
  window.addEventListener("touchstart", unlock, { once: true });
}
document.addEventListener("DOMContentLoaded", setupAudioUnlock);

// ──────────────────────────────────────────────
// SAFE SOUND
// ──────────────────────────────────────────────
function playSoundSafe(entity) {
  if (!entity || !entity.components.sound) return;
  const sound = entity.components.sound;
  if (sound.isPlaying) sound.stopSound();
  if (sound.loaded) {
    sound.playSound();
  } else {
    entity.addEventListener("sound-loaded", () => sound.playSound(), { once: true });
  }
}

// ──────────────────────────────────────────────
// TOUCH INPUT STATE
// Кнопки пишут сюда — player-controller читает
// ──────────────────────────────────────────────
window.TouchInput = { left: false, right: false };

function bindTouchButton(id, direction) {
  const btn = document.getElementById(id);

  function press(e) {
    e.preventDefault();
    window.TouchInput[direction] = true;
    btn.classList.add("pressed");
  }
  function release(e) {
    e.preventDefault();
    window.TouchInput[direction] = false;
    btn.classList.remove("pressed");
  }

  btn.addEventListener("touchstart",  press,   { passive: false });
  btn.addEventListener("touchend",    release, { passive: false });
  btn.addEventListener("touchcancel", release, { passive: false });

  // Мышь — для отладки на ПК
  btn.addEventListener("mousedown",  press);
  btn.addEventListener("mouseup",    release);
  btn.addEventListener("mouseleave", release);
}

document.addEventListener("DOMContentLoaded", () => {
  bindTouchButton("btn-left",  "left");
  bindTouchButton("btn-right", "right");
});

// ──────────────────────────────────────────────
// PLAYER CONTROLLER
// Читает и клавиши, и TouchInput
// ──────────────────────────────────────────────
AFRAME.registerComponent("player-controller", {
  schema: {
    speed: { type: "number", default: 5 },
    limit: { type: "number", default: 4 }
  },
  init: function () {
    this.keys = {};
    window.addEventListener("keydown", (e) => this.keys[e.code] = true);
    window.addEventListener("keyup",   (e) => this.keys[e.code] = false);
  },
  tick: function (time, dt) {
    const delta = dt / 1000;
    const pos   = this.el.object3D.position;
    let dir = 0;

    if (this.keys["ArrowLeft"]  || this.keys["KeyA"]) dir -= 1;
    if (this.keys["ArrowRight"] || this.keys["KeyD"]) dir += 1;

    if (window.TouchInput.left)  dir -= 1;
    if (window.TouchInput.right) dir += 1;

    if (dir < -1) dir = -1;
    if (dir >  1) dir =  1;

    pos.x += dir * this.data.speed * delta;
    pos.x  = Math.max(-this.data.limit, Math.min(this.data.limit, pos.x));
  }
});

// ──────────────────────────────────────────────
// BLOCK SPAWNER (пулинг + честная коллизия)
// ──────────────────────────────────────────────
AFRAME.registerComponent("block-spawner", {
  schema: {
    interval:   { default: 1500 },
    laneOffset: { default: 2.5  },
    lanes:      { default: 3    },
    startZ:     { default: -30  },
    endZ:       { default: 5    }
  },
  init: function () {
    this.lastSpawn       = -2000;
    this.score           = 0;
    this.gameOver        = false;
    this.speedMultiplier = 1;
    this.baseSpeed       = 35 / 3;

    this.player        = document.querySelector("#player-body");
    this.scoreText     = document.querySelector("#scoreText");
    this.gameOverPanel = document.querySelector("#gameOverPanel");
    this.gameOverText  = document.querySelector("#gameOverText");

    this.audioDeath   = document.querySelector("#deathSound");
    this.audioRestart = document.querySelector("#restartSound");
    this.audioSuccess = document.querySelector("#successDodgeSound");

    this.poolSize = 15;
    this.blocks   = [];
    const scene   = this.el.sceneEl;

    for (let i = 0; i < this.poolSize; i++) {
      const parent = document.createElement("a-entity");
      const model  = document.createElement("a-entity");
      model.setAttribute("gltf-model", "#stoneModel");
      parent.appendChild(model);
      parent.setAttribute("visible", "false");
      scene.appendChild(parent);
      this.blocks.push({ parent, model, active: false });
    }
  },

  tick: function (time, dt) {
    if (this.gameOver) return;

    if (time - this.lastSpawn > this.data.interval) {
      this.spawnBlock();
      this.lastSpawn = time;
    }

    const delta = dt / 1000;
    const moveZ = this.baseSpeed * this.speedMultiplier * delta;

    for (let i = 0; i < this.blocks.length; i++) {
      const b = this.blocks[i];
      if (b.active) {
        b.parent.object3D.position.z += moveZ;
        if (b.parent.object3D.position.z > this.data.endZ) {
          b.active = false;
          b.parent.setAttribute("visible", "false");
          this.onPassed();
        }
      }
    }

    this.checkCollisions();
  },

  checkCollisions: function () {
    if (this.gameOver || !this.player) return;

    const playerBox = new THREE.Box3();
    playerBox.setFromObject(this.player.object3D);
    playerBox.expandByScalar(-0.1);

    for (let i = 0; i < this.blocks.length; i++) {
      const b = this.blocks[i];
      if (b.active) {
        const blockBox = new THREE.Box3();
        blockBox.setFromObject(b.model.object3D);
        if (playerBox.intersectsBox(blockBox)) {
          this.onHit();
          return;
        }
      }
    }
  },

  spawnBlock: function () {
    const laneIndex = Math.floor(Math.random() * this.data.lanes);
    const x = (laneIndex - Math.floor(this.data.lanes / 2)) * this.data.laneOffset;
    this.activateBlock(x);

    if (Math.random() < 0.35) {
      let other;
      do {
        other = (Math.floor(Math.random() * this.data.lanes) -
          Math.floor(this.data.lanes / 2)) * this.data.laneOffset;
      } while (other === x);
      this.activateBlock(other);
    }
  },

  activateBlock: function (x) {
    const b = this.blocks.find(item => !item.active);
    if (!b) return;

    let scale = THREE.MathUtils.randFloat(0.5, 1.3);
    if (Math.random() < 0.05) scale = THREE.MathUtils.randFloat(1.6, 2.4);

    b.model.setAttribute("scale",     `${scale} ${scale} ${scale}`);
    b.model.setAttribute("rotation",  `0 ${Math.random() * 360} 0`);
    b.parent.setAttribute("position", `${x} 1.25 ${this.data.startZ}`);
    b.active = true;
    b.parent.setAttribute("visible", "true");
  },

  onPassed: function () {
    this.score++;
    if (this.score % 5 === 0) this.speedMultiplier += 0.15;
    playSoundSafe(this.audioSuccess);
    this.scoreText.setAttribute("troika-text", "value", `Очки: ${this.score}`);
  },

  onHit: function () {
    this.gameOver = true;
    playSoundSafe(this.audioDeath);

    for (let i = 0; i < this.blocks.length; i++) {
      const b = this.blocks[i];
      if (b.active) {
        b.parent.setAttribute("dynamic-body", "mass: 2; shape: box");
        setTimeout(() => {
          if (b.parent.body) {
            b.parent.body.velocity.set(
              (Math.random() - 0.5) * 20,
              5 + Math.random() * 10,
              (Math.random() - 0.5) * 20
            );
            b.parent.body.angularVelocity.set(
              Math.random() * 5, Math.random() * 5, Math.random() * 5
            );
          }
        }, 50);
      }
    }

    // Прячем кнопки управления, показываем рестарт
    document.getElementById("touch-controls").style.display = "none";
    document.getElementById("restart-ui").style.display = "flex";

    this.gameOverPanel.setAttribute("visible", true);
    this.gameOverText.setAttribute("troika-text", "value",
      `Игра окончена\nСчёт: ${this.score}\nНажмите кнопку ниже`);

    window.addEventListener("keydown", (e) => {
      if (e.code === "KeyR") {
        playSoundSafe(this.audioRestart);
        setTimeout(() => location.reload(), 400);
      }
    });
  }
});

// ──────────────────────────────────────────────
// UI ANIMATION
// ──────────────────────────────────────────────
AFRAME.registerComponent("hint-pulse", {
  init: function () {
    this.el.setAttribute("animation__pulse",
      "property:scale;dir:alternate;dur:800;loop:true;to:1.1 1.1 1.1");
  }
});
</script>
</head>

<body>

<!-- Оверлей старта -->
<div id="audio-unlock-overlay">
  <p>Нажмите для начала игры</p>
</div>

<!-- ── Кнопки управления ── -->
<div id="touch-controls">
  <button id="btn-left"  class="ctrl-btn" aria-label="Влево">&#9664;</button>
  <button id="btn-right" class="ctrl-btn" aria-label="Вправо">&#9654;</button>
</div>

<!-- ── Кнопка рестарта (появляется после Game Over) ── -->
<div id="restart-ui" style="
  display: none;
  position: fixed;
  bottom: 40px;
  left: 0; right: 0;
  justify-content: center;
  z-index: 9000;">
  <button onclick="location.reload()" style="
    padding: 16px 48px;
    font-size: 1.1rem;
    font-family: system-ui;
    letter-spacing: 0.08em;
    background: rgba(255,235,59,0.2);
    border: 2px solid #ffeb3b;
    color: #ffeb3b;
    border-radius: 8px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 0 20px rgba(255,235,59,0.3);">
    &#x1F504; РЕСТАРТ
  </button>
</div>

<!-- ── A-Frame сцена ── -->
<a-scene
  physics="gravity:-15"
  shadow="type:pcfsoft"
  renderer="antialias:true;colorManagement:true">

  <a-assets>
    <img id="groundTex" src="textures/grass.jpg"  crossorigin="anonymous">
    <img id="skyTex"    src="textures/sky.jpg"    crossorigin="anonymous">
    <img id="poster"    src="textures/poster.png" crossorigin="anonymous">
    <a-asset-item id="stoneModel" src="models/concrete_obstacle.glb"></a-asset-item>
    <audio id="deathAudio"        src="sounds/death.mp3"></audio>
    <audio id="restartAudio"      src="sounds/restart.mp3"></audio>
    <audio id="successDodgeAudio" src="sounds/success dodge.mp3"></audio>
  </a-assets>

  <a-sky src="#skyTex"></a-sky>

  <a-entity light="type:directional;intensity:0.9;castShadow:true" position="0 8 -5"></a-entity>
  <a-entity light="type:ambient;intensity:0.4"></a-entity>

  <a-entity
    geometry="primitive:box;width:15;height:0.5;depth:45"
    material="src:#groundTex;repeat:10 20"
    position="0 0 0"
    static-body>
  </a-entity>

  <a-entity position="-6 3 -4">
    <a-plane src="#poster" width="4" height="2" material="side:double"></a-plane>
    <a-entity position="0 -1.4 0"
      troika-text="value: Уклоняйся от блоков!;align:center;color:#fff;fontSize:0.22">
    </a-entity>
  </a-entity>

  <a-entity
    id="player-rig"
    player-controller
    position="0 1.6 4">
      <a-entity camera look-controls wasd-controls-enabled="false"></a-entity>
      <a-box
        id="player-body"
        position="0 -1.2 0"
        depth="0.8" height="1.6" width="0.8"
        visible="false"
        static-body="shape:box">
      </a-box>
  </a-entity>

  <a-entity block-spawner></a-entity>

  <a-entity
    id="scoreText"
    position="0 3 -2"
    troika-text="value: Очки: 0;align:center;color:#fff;fontSize:0.2">
  </a-entity>

  <a-entity
    position="0 2.3 -1.5"
    hint-pulse
    troika-text="value: ◀ ▶ кнопки внизу экрана;align:center;color:#ffeb3b;fontSize:0.18">
  </a-entity>

  <a-entity
    id="gameOverPanel"
    visible="false"
    position="0 2 -2.5"
    geometry="primitive:plane;width:4;height:2"
    material="color:black;opacity:0.7">
      <a-entity id="gameOverText" position="0 0 0.01"
        troika-text="align:center;color:white;fontSize:0.12">
      </a-entity>
  </a-entity>

  <a-entity id="deathSound"        sound="src:#deathAudio;positional:false"></a-entity>
  <a-entity id="restartSound"      sound="src:#restartAudio;positional:false"></a-entity>
  <a-entity id="successDodgeSound" sound="src:#successDodgeAudio;positional:false"></a-entity>

</a-scene>

</body>
</html>
