<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GPS Block Collector – AR Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Courier New', monospace;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Фикс растяжения: видео AR.js всегда cover ── */
  #arjs-video,
  video {
    position: fixed !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
    min-width: 100% !important;
    min-height: 100% !important;
    width: auto !important;
    height: auto !important;
    object-fit: cover !important;
    z-index: -1 !important;
  }

  a-scene {
    position: fixed;
    top: 0; left: 0;
    width: 100% !important;
    height: 100% !important;
  }

  /* ─── HUD ─── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 9999;
    pointer-events: none;
  }

  #top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
  }

  .hud-box {
    background: rgba(0,255,120,0.12);
    border: 1.5px solid rgba(0,255,120,0.55);
    border-radius: 8px;
    padding: 8px 16px;
    color: #00ff78;
    font-size: 1rem;
    letter-spacing: 0.08em;
    text-shadow: 0 0 8px rgba(0,255,120,0.8);
    min-width: 90px;
    text-align: center;
  }

  .hud-box span {
    display: block;
    font-size: 0.62rem;
    opacity: 0.7;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  #timer-box {
    font-size: 1.5rem;
    background: rgba(255,60,60,0.12);
    border-color: rgba(255,80,80,0.6);
    color: #ff5050;
    text-shadow: 0 0 10px rgba(255,60,60,0.9);
  }

  #timer-box.urgent {
    animation: urgentPulse 0.5s infinite alternate;
    background: rgba(255,30,30,0.25);
    border-color: #ff3030;
  }

  @keyframes urgentPulse {
    from { box-shadow: 0 0 6px rgba(255,50,50,0.6); }
    to   { box-shadow: 0 0 22px rgba(255,50,50,1); }
  }

  /* ─── Индикаторы направления ─── */
  #compass-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 6px 12px;
    flex-wrap: wrap;
  }

  .block-indicator {
    font-size: 0.6rem;
    color: #00ff78;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(0,255,120,0.4);
    border-radius: 4px;
    padding: 3px 8px;
    letter-spacing: 0.06em;
  }

  /* ─── Вспышка при сборе ─── */
  #collect-flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10000;
    background: radial-gradient(circle, rgba(0,255,120,0.45) 0%, transparent 70%);
    opacity: 0;
  }

  #collect-flash.flash {
    animation: flashOut 0.35s forwards;
  }

  @keyframes flashOut {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ─── Попап +1 ─── */
  .score-popup {
    position: fixed;
    z-index: 10001;
    left: 50%;
    transform: translateX(-50%);
    color: #00ff78;
    font-size: 2rem;
    font-weight: bold;
    text-shadow: 0 0 16px #00ff78, 0 0 4px #fff;
    pointer-events: none;
    animation: popUp 0.8s ease-out forwards;
    letter-spacing: 0.05em;
  }

  @keyframes popUp {
    0%   { top: 50%; opacity: 1; transform: translateX(-50%) scale(0.8); }
    60%  { top: 38%; opacity: 1; transform: translateX(-50%) scale(1.2); }
    100% { top: 28%; opacity: 0; transform: translateX(-50%) scale(1); }
  }

  /* ─── Прицел ─── */
  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9998;
    pointer-events: none;
    width: 44px;
    height: 44px;
  }

  #crosshair::before,
  #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(0,255,120,0.75);
    border-radius: 2px;
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }

  #crosshair .ring {
    position: absolute;
    inset: 0;
    border: 1.5px solid rgba(0,255,120,0.4);
    border-radius: 50%;
    animation: ringPulse 2s infinite;
  }

  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50%       { transform: scale(1.25); opacity: 0.15; }
  }

  /* ─── Оверлеи старт/финиш ─── */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 20000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.88);
    color: #fff;
    text-align: center;
    padding: 24px;
  }

  .overlay.hidden { display: none; }

  .overlay h1 {
    font-size: 2rem;
    letter-spacing: 0.12em;
    color: #00ff78;
    text-shadow: 0 0 20px #00ff78;
    margin-bottom: 10px;
  }

  .overlay p {
    font-size: 0.95rem;
    opacity: 0.75;
    max-width: 320px;
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .overlay .big-score {
    font-size: 4rem;
    color: #00ff78;
    text-shadow: 0 0 30px #00ff78;
    margin: 12px 0;
  }

  .overlay button {
    margin-top: 20px;
    padding: 14px 36px;
    font-size: 1rem;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.12em;
    background: transparent;
    border: 2px solid #00ff78;
    color: #00ff78;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  }

  .overlay button:active {
    background: #00ff78;
    color: #000;
    box-shadow: 0 0 22px #00ff78;
  }

  /* ─── GPS статус ─── */
  #gps-status {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- ─── HUD ─── -->
<div id="hud">
  <div id="top-bar">
    <div class="hud-box">
      <span>Очки</span>
      <strong id="score-val">0</strong>
    </div>
    <div class="hud-box" id="timer-box">
      <span>Время</span>
      <strong id="timer-val">30</strong>
    </div>
    <div class="hud-box">
      <span>Блоки</span>
      <strong id="blocks-val">0</strong>
    </div>
  </div>
  <div id="compass-bar"></div>
</div>

<div id="crosshair"><div class="ring"></div></div>
<div id="collect-flash"></div>
<div id="gps-status">GPS: ожидание…</div>

<!-- ─── СТАРТ ─── -->
<div id="start-overlay" class="overlay">
  <h1>📦 BLOCK HUNT</h1>
  <p>Блоки появляются рядом с тобой прямо в комнате.<br>Подойди к блоку, чтобы собрать его.</p>
  <p>У тебя <strong>30 секунд</strong>. Собери как можно больше!</p>
  <p style="font-size:0.78rem;opacity:0.5;margin-top:4px;">Требуется: GPS + камера</p>
  <button id="start-btn">GPS: ожидание…</button>
</div>

<!-- ─── ФИНИШ ─── -->
<div id="end-overlay" class="overlay hidden">
  <h1>ВРЕМЯ ВЫШЛО</h1>
  <div class="big-score" id="final-score">0</div>
  <p>блоков собрано</p>
  <p id="end-comment" style="margin-top:10px;font-size:0.85rem;color:#aaa;"></p>
  <button id="restart-btn">ИГРАТЬ СНОВА</button>
</div>

<!-- ─── A-FRAME ─── -->
<a-scene
  vr-mode-ui="enabled:false"
  arjs="sourceType:webcam; videoTexture:true; debugUIEnabled:false;"
  renderer="antialias:true; logarithmicDepthBuffer:true;"
  embedded>

  <a-camera
    id="ar-camera"
    gps-new-camera="gpsMinDistance:0.1; gpsTimeInterval:100"
    look-controls="enabled:true"
    arjs-look-controls="smoothingFactor:0.1">
  </a-camera>

</a-scene>

<script>
'use strict';

// ── КОНФИГ ──
const GAME_DURATION  = 30;   // секунд
const BLOCK_COUNT    = 8;    // блоков на поле
const SPAWN_MIN_M    = 2;    // минимальный радиус спавна (метры)
const SPAWN_MAX_M    = 8;    // максимальный радиус спавна (метры)
const COLLECT_DIST_M = 2.5;  // дистанция сбора (метры)
const POLL_MS        = 400;  // интервал проверки коллизий

// ── СОСТОЯНИЕ ──
let gameRunning = false;
let score       = 0;
let timeLeft    = GAME_DURATION;
let timerInt    = null;
let pollInt     = null;
let playerLat   = null;
let playerLon   = null;
let gpsReady    = false;
let blocks      = [];
let blockSeq    = 0;

const $ = id => document.getElementById(id);
const scene = document.querySelector('a-scene');

// ── МАТЕМАТИКА ──

function distM(lat1, lon1, lat2, lon2) {
  const R    = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a    = Math.sin(dLat/2)**2 +
               Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function bearing(lat1, lon1, lat2, lon2) {
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const y    = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
  const x    = Math.cos(lat1*Math.PI/180) * Math.sin(lat2*Math.PI/180) -
               Math.sin(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.cos(dLon);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function randomOffset(lat, lon, minM, maxM) {
  const dist  = minM + Math.random() * (maxM - minM);
  const angle = Math.random() * 2 * Math.PI;
  const dLat  = (dist * Math.cos(angle)) / 111320;
  const dLon  = (dist * Math.sin(angle)) / (111320 * Math.cos(lat * Math.PI / 180));
  return { lat: lat + dLat, lon: lon + dLon };
}

function blockColor(d) {
  if (d < COLLECT_DIST_M * 1.5) return '#ff4444';
  if (d < 4)  return '#ff9900';
  if (d < 6)  return '#ffee00';
  return '#00ccff';
}

function bearingToArrow(deg) {
  return ['↑N','↗NE','→E','↘SE','↓S','↙SW','←W','↖NW'][Math.round(deg / 45) % 8];
}

// ── GPS ──

function initGPS() {
  if (!navigator.geolocation) {
    $('start-btn').textContent = 'GPS недоступен';
    return;
  }
  navigator.geolocation.watchPosition(
    pos => {
      playerLat = pos.coords.latitude;
      playerLon = pos.coords.longitude;
      const acc = Math.round(pos.coords.accuracy);
      $('gps-status').textContent = `±${acc}м`;

      if (!gpsReady) {
        gpsReady = true;
        $('start-btn').disabled = false;
        $('start-btn').textContent = 'НАЧАТЬ ИГРУ';
      }
    },
    err => {
      $('gps-status').textContent = 'GPS: ошибка';
      // Фоллбэк через 5 сек — позволяет играть без GPS (тестирование)
    },
    { enableHighAccuracy: true, maximumAge: 500, timeout: 8000 }
  );
}

// ── ФИКС ВИДЕО: применяем cover после загрузки сцены ──

function fixVideoStretch() {
  // AR.js создаёт <video> динамически — ждём его появления
  const apply = () => {
    const videos = document.querySelectorAll('video');
    videos.forEach(v => {
      v.style.cssText = `
        position: fixed !important;
        top: 50% !important; left: 50% !important;
        transform: translate(-50%, -50%) !important;
        min-width: 100vw !important; min-height: 100vh !important;
        width: auto !important; height: auto !important;
        object-fit: cover !important;
        z-index: -1 !important;
      `;
    });
    // Также canvas AR.js
    const canvases = document.querySelectorAll('canvas.a-canvas');
    canvases.forEach(c => {
      c.style.cssText = `
        position: fixed !important;
        top: 0 !important; left: 0 !important;
        width: 100% !important; height: 100% !important;
      `;
    });
  };

  // Применяем сразу и через observer — AR.js может вставить видео позже
  apply();
  const obs = new MutationObserver(apply);
  obs.observe(document.body, { childList: true, subtree: true });
  // Дополнительный запуск через 1 и 2 сек на случай задержки инициализации
  setTimeout(apply, 1000);
  setTimeout(apply, 2000);
}

document.addEventListener('DOMContentLoaded', fixVideoStretch);

// ── БЛОКИ ──

function spawnBlock() {
  if (!gpsReady || !playerLat) return;

  const { lat, lon } = randomOffset(playerLat, playerLon, SPAWN_MIN_M, SPAWN_MAX_M);
  const id = ++blockSeq;

  const entity = document.createElement('a-entity');
  entity.setAttribute('id', `block-${id}`);
  entity.setAttribute('gps-new-entity-place', `latitude:${lat};longitude:${lon}`);

  // Куб
  const cube = document.createElement('a-box');
  cube.setAttribute('color', '#00ccff');
  cube.setAttribute('width',  '0.4');
  cube.setAttribute('height', '0.4');
  cube.setAttribute('depth',  '0.4');
  cube.setAttribute('position', '0 0.5 0');
  cube.setAttribute('opacity', '0.9');
  cube.setAttribute('material', 'emissive:#003366; emissiveIntensity:0.5; metalness:0.4; roughness:0.3');
  cube.setAttribute('animation',        'property:rotation; to:0 360 0; loop:true; dur:2500; easing:linear');
  cube.setAttribute('animation__bob',   'property:position; from:0 0.4 0; to:0 0.65 0; dir:alternate; loop:true; dur:1000; easing:easeInOutSine');

  // Кольцо на земле
  const ring = document.createElement('a-torus');
  ring.setAttribute('color', '#00ccff');
  ring.setAttribute('radius', '0.3');
  ring.setAttribute('radius-tubular', '0.02');
  ring.setAttribute('position', '0 0.05 0');
  ring.setAttribute('rotation', '90 0 0');
  ring.setAttribute('material', 'emissive:#00ccff; emissiveIntensity:0.8');
  ring.setAttribute('animation__scale', 'property:scale; from:1 1 1; to:1.4 1.4 1.4; dir:alternate; loop:true; dur:800; easing:easeInOutSine');

  // Метка с номером
  const label = document.createElement('a-text');
  label.setAttribute('value', `#${id}`);
  label.setAttribute('align', 'center');
  label.setAttribute('color', '#ffffff');
  label.setAttribute('position', '0 1.0 0');
  label.setAttribute('scale', '1 1 1');
  label.setAttribute('look-at', '[gps-new-camera]');

  entity.appendChild(cube);
  entity.appendChild(ring);
  entity.appendChild(label);
  scene.appendChild(entity);

  blocks.push({ id, lat, lon, el: entity, cube, ring, label, collected: false });
  updateBlocksUI();
}

function removeBlock(b) {
  b.collected = true;

  // Анимация взрыва
  b.cube.setAttribute('animation__explode', 'property:scale; to:3 3 3; dur:180; easing:easeOutQuad');
  b.cube.setAttribute('animation__fade',    'property:material.opacity; to:0; dur:220; easing:easeOutQuad');
  b.ring.setAttribute('animation__rfade',   'property:material.opacity; to:0; dur:200');

  setTimeout(() => {
    if (b.el.parentNode) b.el.parentNode.removeChild(b.el);
    blocks = blocks.filter(x => !x.collected);
    updateBlocksUI();
    if (gameRunning) spawnBlock();
  }, 250);
}

function updateBlocksUI() {
  $('blocks-val').textContent = blocks.filter(b => !b.collected).length;
}

// ── ПРОВЕРКА КОЛЛИЗИЙ ──

function checkCollisions() {
  if (!gameRunning || !playerLat) return;

  const active = blocks.filter(b => !b.collected);

  active.forEach(b => {
    const d = distM(playerLat, playerLon, b.lat, b.lon);

    // Обновляем цвет по дистанции
    const c = blockColor(d);
    b.cube.setAttribute('color', c);
    b.ring.setAttribute('color', c);
    b.cube.setAttribute('material', `emissive:${c}; emissiveIntensity:0.5; metalness:0.4; roughness:0.3`);

    if (d <= COLLECT_DIST_M) collectBlock(b);
  });

  updateCompass(active);
}

function collectBlock(b) {
  score++;
  $('score-val').textContent = score;
  removeBlock(b);

  // Вспышка
  const flash = $('collect-flash');
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');

  // Попап
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = '+1';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 800);

  if (navigator.vibrate) navigator.vibrate([25, 10, 40]);
}

// ── КОМПАС ──

function updateCompass(active) {
  const bar = $('compass-bar');
  bar.innerHTML = '';
  if (!playerLat) return;

  active.slice(0, 6).forEach(b => {
    const d    = Math.round(distM(playerLat, playerLon, b.lat, b.lon));
    const bear = Math.round(bearing(playerLat, playerLon, b.lat, b.lon));
    const dir  = bearingToArrow(bear);

    const el = document.createElement('div');
    el.className = 'block-indicator';
    el.style.borderColor = blockColor(d);
    el.style.color = blockColor(d);
    el.textContent = `${dir} ${d}м`;
    bar.appendChild(el);
  });
}

// ── ИГРОВОЙ ПОТОК ──

function startGame() {
  score    = 0;
  timeLeft = GAME_DURATION;
  blocks   = [];
  $('score-val').textContent  = '0';
  $('timer-val').textContent  = GAME_DURATION;
  $('blocks-val').textContent = '0';
  $('timer-box').classList.remove('urgent');
  gameRunning = true;

  $('start-overlay').classList.add('hidden');
  $('end-overlay').classList.add('hidden');

  for (let i = 0; i < BLOCK_COUNT; i++) {
    setTimeout(() => spawnBlock(), i * 150);
  }

  timerInt = setInterval(() => {
    timeLeft--;
    $('timer-val').textContent = timeLeft;
    if (timeLeft <= 10) $('timer-box').classList.add('urgent');
    if (timeLeft <= 0)  endGame();
  }, 1000);

  pollInt = setInterval(checkCollisions, POLL_MS);
}

function endGame() {
  gameRunning = false;
  clearInterval(timerInt);
  clearInterval(pollInt);

  blocks.forEach(b => { if (b.el.parentNode) b.el.parentNode.removeChild(b.el); });
  blocks = [];

  $('final-score').textContent = score;

  const table = [
    [0,  'Попробуй ещё раз!'],
    [3,  'Неплохо для начала!'],
    [6,  'Хорошая попытка 👟'],
    [10, 'Отлично! Быстрые ноги!'],
    [15, 'Невероятно! Чемпион! 🏆'],
  ];
  let comment = table[0][1];
  for (const [t, txt] of table) { if (score >= t) comment = txt; }
  $('end-comment').textContent = comment;

  $('end-overlay').classList.remove('hidden');
}

// ── КНОПКИ ──

$('start-btn').disabled = true;
$('start-btn').addEventListener('click', () => { if (gpsReady) startGame(); });
$('restart-btn').addEventListener('click', () => {
  $('end-overlay').classList.add('hidden');
  setTimeout(startGame, 200);
});

// Фоллбэк: если GPS не пришёл за 8 сек — разрешаем старт с фейковой позицией
setTimeout(() => {
  if (!gpsReady) {
    playerLat = 50.1109;
    playerLon = 8.6821;
    gpsReady  = true;
    $('start-btn').disabled = false;
    $('start-btn').textContent = 'ИГРАТЬ (без GPS)';
    $('gps-status').textContent = 'GPS недоступен — тест режим';
  }
}, 8000);

initGPS();
</script>
</body>
</html>
