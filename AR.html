<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Dodge Blocks - Stable Build</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

    <script>
        window.THREEx = window.THREEx || {};
    </script>

    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; color: #fff; text-align: center; cursor: pointer;
            font-family: sans-serif;
        }
        #ui-layer {
            position: fixed; bottom: 20px; left: 20px; color: #0f0;
            font-family: monospace; z-index: 10; pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="ui-layer">Статус: Жду нажатия...</div>

    <div id="overlay" onclick="initAR()">
        <div>
            <h2>AR GPS GAME</h2>
            <p>Нажми для старта<br>(Требуется HTTPS)</p>
        </div>
    </div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">

        <a-camera gps-new-camera="gpsMinDistance: 1" rotation-reader>
            <a-entity id="scoreText" position="0 1 -2" 
                      troika-text="value: Счёт: 0; align: center; fontSize: 0.15; color: #fff;">
            </a-entity>
        </a-camera>

        <a-entity game-logic></a-entity>

    </a-scene>

    <script>
        const ui = document.getElementById('ui-layer');

        async function initAR() {
            document.getElementById('overlay').style.display = 'none';
            ui.innerText = "Статус: Запрос разрешений...";

            // Принудительный запрос геолокации
            navigator.geolocation.getCurrentPosition(
                () => {
                    ui.innerText = "Статус: GPS получен. Ищу спутники...";
                },
                (err) => {
                    ui.innerText = "Ошибка GPS: " + err.message;
                }
            );

            // iOS доступ к гироскопу
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
        }

        AFRAME.registerComponent('game-logic', {
            init: function () {
                this.score = 0;
                this.lastSpawn = 0;
                this.blocks = [];
                this.camera = document.querySelector('[gps-new-camera]');

                // Слушаем событие GPS от AR.js
                window.addEventListener('gps-camera-update-position', (e) => {
                    this.ready = true;
                    ui.innerText = "Статус: Игра запущена!";
                });
            },

            tick: function (time, delta) {
                if (!this.ready) return;

                // Спавн блока раз в 5 секунд
                if (time - this.lastSpawn > 5000) {
                    this.spawnBlock(time);
                    this.lastSpawn = time;
                }

                // Проверка столкновений
                const camPos = this.camera.object3D.position;
                for (let i = this.blocks.length - 1; i >= 0; i--) {
                    const b = this.blocks[i];
                    if (!b.el.object3D) continue;

                    const dist = camPos.distanceTo(b.el.object3D.position);

                    // Если блок близко (от 0.5 до 2 метров)
                    if (dist > 0.5 && dist < 2) {
                        ui.innerText = "БАБАХ! Счёт: " + this.score;
                        this.score = 0;
                        this.updateScore();
                    }

                    // Удаление старых блоков (через 15 сек)
                    if (time - b.time > 15000) {
                        this.removeBlock(i);
                        this.score++;
                        this.updateScore();
                    }
                }
            },

            spawnBlock: function (time) {
                const coords = this.camera.components['gps-new-camera'].currentCoords;
                if (!coords) return;

                const lat = coords.latitude + (Math.random() - 0.5) * 0.0005;
                const lon = coords.longitude + (Math.random() - 0.5) * 0.0005;

                const el = document.createElement('a-entity');
                el.setAttribute('geometry', 'primitive: box; width: 2; height: 2; depth: 2');
                el.setAttribute('material', 'color: red; opacity: 0.8');
                el.setAttribute('gps-new-entity-place', `latitude: ${lat}; longitude: ${lon}`);

                this.el.sceneEl.appendChild(el);
                this.blocks.push({ el: el, time: time });
                console.log("Блок создан на", lat, lon);
            },

            removeBlock: function (idx) {
                const b = this.blocks[idx];
                if (b.el.parentNode) b.el.parentNode.removeChild(b.el);
                this.blocks.splice(idx, 1);
            },

            updateScore: function () {
                document.getElementById('scoreText').setAttribute('troika-text', 'value', 'Счёт: ' + this.score);
            }
        });
    </script>
</body>
</html>
