<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GPS Block Collector – AR Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<!-- AR.js with GPS support -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
<!-- GPS Location component -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    background: #000;
    font-family: 'Courier New', monospace;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ─── HUD ─── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 9999;
    pointer-events: none;
  }

  #top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
  }

  .hud-box {
    background: rgba(0,255,120,0.12);
    border: 1.5px solid rgba(0,255,120,0.55);
    border-radius: 8px;
    padding: 8px 16px;
    color: #00ff78;
    font-size: 1rem;
    letter-spacing: 0.08em;
    text-shadow: 0 0 8px rgba(0,255,120,0.8);
    min-width: 90px;
    text-align: center;
  }

  .hud-box span {
    display: block;
    font-size: 0.62rem;
    opacity: 0.7;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  #timer-box {
    font-size: 1.5rem;
    background: rgba(255,60,60,0.12);
    border-color: rgba(255,80,80,0.6);
    color: #ff5050;
    text-shadow: 0 0 10px rgba(255,60,60,0.9);
  }

  #timer-box.urgent {
    animation: urgentPulse 0.5s infinite alternate;
    background: rgba(255,30,30,0.25);
    border-color: #ff3030;
  }

  @keyframes urgentPulse {
    from { box-shadow: 0 0 6px rgba(255,50,50,0.6); }
    to   { box-shadow: 0 0 22px rgba(255,50,50,1); }
  }

  /* ─── Radar / compass strip ─── */
  #compass-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 6px 12px;
    flex-wrap: wrap;
  }

  .block-indicator {
    font-size: 0.6rem;
    color: #00ff78;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(0,255,120,0.4);
    border-radius: 4px;
    padding: 3px 8px;
    letter-spacing: 0.06em;
  }

  /* ─── Collect flash ─── */
  #collect-flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10000;
    background: radial-gradient(circle, rgba(0,255,120,0.45) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.06s;
  }

  #collect-flash.flash {
    opacity: 1;
    animation: flashOut 0.35s forwards;
  }

  @keyframes flashOut {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ─── Floating score popup ─── */
  .score-popup {
    position: fixed;
    z-index: 10001;
    left: 50%;
    transform: translateX(-50%);
    color: #00ff78;
    font-size: 2rem;
    font-weight: bold;
    text-shadow: 0 0 16px #00ff78, 0 0 4px #fff;
    pointer-events: none;
    animation: popUp 0.8s ease-out forwards;
    letter-spacing: 0.05em;
  }

  @keyframes popUp {
    0%   { top: 50%; opacity: 1; transform: translateX(-50%) scale(0.8); }
    60%  { top: 38%; opacity: 1; transform: translateX(-50%) scale(1.2); }
    100% { top: 28%; opacity: 0; transform: translateX(-50%) scale(1); }
  }

  /* ─── Crosshair ─── */
  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9998;
    pointer-events: none;
    width: 44px;
    height: 44px;
  }

  #crosshair::before,
  #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(0,255,120,0.75);
    border-radius: 2px;
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }

  #crosshair .ring {
    position: absolute;
    inset: 0;
    border: 1.5px solid rgba(0,255,120,0.4);
    border-radius: 50%;
    animation: ringPulse 2s infinite;
  }

  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50%       { transform: scale(1.25); opacity: 0.15; }
  }

  /* ─── Overlays: start / end ─── */
  #overlay {
    position: fixed;
    inset: 0;
    z-index: 20000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.88);
    color: #fff;
    text-align: center;
    padding: 24px;
  }

  #overlay.hidden { display: none; }

  #overlay h1 {
    font-size: 2rem;
    letter-spacing: 0.12em;
    color: #00ff78;
    text-shadow: 0 0 20px #00ff78;
    margin-bottom: 10px;
  }

  #overlay p {
    font-size: 0.95rem;
    opacity: 0.75;
    max-width: 320px;
    line-height: 1.6;
    margin-bottom: 8px;
  }

  #overlay .big-score {
    font-size: 4rem;
    color: #00ff78;
    text-shadow: 0 0 30px #00ff78;
    margin: 12px 0;
  }

  #overlay button {
    margin-top: 20px;
    padding: 14px 36px;
    font-size: 1rem;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.12em;
    background: transparent;
    border: 2px solid #00ff78;
    color: #00ff78;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  }

  #overlay button:hover {
    background: #00ff78;
    color: #000;
    box-shadow: 0 0 22px #00ff78;
  }

  /* ─── GPS status ─── */
  #gps-status {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
    pointer-events: none;
  }

  /* No AR/GPS warning */
  #no-gps-warning {
    display: none;
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20001;
    background: rgba(255,80,0,0.9);
    color: #fff;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 0.8rem;
    text-align: center;
    max-width: 300px;
  }
</style>
</head>
<body>

<!-- ─────────── HUD ─────────── -->
<div id="hud">
  <div id="top-bar">
    <div class="hud-box" id="score-box">
      <span>Очки</span>
      <strong id="score-val">0</strong>
    </div>
    <div class="hud-box" id="timer-box">
      <span>Время</span>
      <strong id="timer-val">30</strong>
    </div>
    <div class="hud-box" id="blocks-box">
      <span>Блоки</span>
      <strong id="blocks-val">0</strong>
    </div>
  </div>
  <div id="compass-bar"></div>
</div>

<!-- Crosshair -->
<div id="crosshair"><div class="ring"></div></div>

<!-- Screen flash on collect -->
<div id="collect-flash"></div>

<!-- GPS status -->
<div id="gps-status">GPS: ожидание…</div>

<!-- No GPS fallback -->
<div id="no-gps-warning">
  GPS недоступен. Проверьте разрешения браузера и перезагрузите страницу.
</div>

<!-- ─── START OVERLAY ─── -->
<div id="overlay" id="start-overlay">
  <h1>📦 BLOCK HUNT</h1>
  <p>Ходи по улице и собирай блоки.<br>Чем ближе ты к блоку — тем он ярче.</p>
  <p>У тебя <strong>30 секунд</strong>. Собери как можно больше!</p>
  <p style="font-size:0.78rem;opacity:0.5;margin-top:4px;">Требуется: GPS + камера</p>
  <button id="start-btn">НАЧАТЬ ИГРУ</button>
</div>

<!-- ─── END OVERLAY ─── -->
<div id="end-overlay" class="hidden">
  <h1>ВРЕМЯ ВЫШЛО</h1>
  <div class="big-score" id="final-score">0</div>
  <p>блоков собрано</p>
  <p id="end-comment" style="margin-top:10px;font-size:0.85rem;color:#aaa;"></p>
  <button id="restart-btn">ИГРАТЬ СНОВА</button>
</div>

<!-- ─── A-FRAME SCENE ─── -->
<a-scene
  vr-mode-ui="enabled:false"
  arjs="sourceType:webcam; videoTexture:true; debugUIEnabled:false; trackingMethod:best;"
  renderer="antialias:true;logarithmicDepthBuffer:true;"
  embedded
  style="width:100%;height:100vh;">

  <a-assets>
    <!-- Inline SVG texture for blocks to avoid hosting files -->
  </a-assets>

  <!-- GPS Camera -->
  <a-camera
    id="ar-camera"
    gps-new-camera="gpsMinDistance:1;gpsTimeInterval:100"
    look-controls="enabled:true"
    arjs-look-controls="smoothingFactor:0.1"
    rotation-reader>
  </a-camera>

</a-scene>

<!-- ─────────── GAME LOGIC ─────────── -->
<script>
'use strict';

// ────── CONFIG ──────
const GAME_DURATION   = 30;       // seconds
const BLOCK_COUNT     = 10;       // blocks on field at once
const SPAWN_RADIUS_M  = 30;       // metres radius around player
const COLLECT_DIST_M  = 4;        // metres to collect
const BLOCK_POLL_MS   = 500;      // collision check interval
const INDICATOR_DIST  = 60;       // hide indicator if > this metres away

// ────── STATE ──────
let gameRunning   = false;
let score         = 0;
let timeLeft      = GAME_DURATION;
let timerInterval = null;
let pollInterval  = null;
let playerLat     = null;
let playerLon     = null;
let gpsReady      = false;
let blocks        = [];           // {id, lat, lon, el, collected}
let blockIdSeq    = 0;

// ────── DOM REFS ──────
const scoreVal    = document.getElementById('score-val');
const timerVal    = document.getElementById('timer-val');
const blocksVal   = document.getElementById('blocks-val');
const timerBox    = document.getElementById('timer-box');
const gpsStatus   = document.getElementById('gps-status');
const compassBar  = document.getElementById('compass-bar');
const collectFlash= document.getElementById('collect-flash');
const startOverlay= document.getElementById('overlay');
const endOverlay  = document.getElementById('end-overlay');
const finalScore  = document.getElementById('final-score');
const endComment  = document.getElementById('end-comment');
const scene       = document.querySelector('a-scene');

// ────── UTILITIES ──────

/** Haversine distance in metres */
function distMetres(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/** Bearing from player to target (degrees, 0=N) */
function bearing(lat1, lon1, lat2, lon2) {
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
  const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) -
            Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);
  return (Math.atan2(y, x) * 180/Math.PI + 360) % 360;
}

/** Random offset in metres → lat/lon delta */
function randomLatLonOffset(lat, lon, minM, maxM) {
  const dist  = minM + Math.random() * (maxM - minM);
  const angle = Math.random() * 2 * Math.PI;
  const dLat  = (dist * Math.cos(angle)) / 111320;
  const dLon  = (dist * Math.sin(angle)) / (111320 * Math.cos(lat * Math.PI / 180));
  return { lat: lat + dLat, lon: lon + dLon };
}

// ────── GPS INIT ──────
function initGPS() {
  if (!navigator.geolocation) {
    document.getElementById('no-gps-warning').style.display = 'block';
    return;
  }

  const opts = { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 };

  navigator.geolocation.watchPosition(pos => {
    playerLat = pos.coords.latitude;
    playerLon = pos.coords.longitude;
    const acc  = Math.round(pos.coords.accuracy);
    gpsStatus.textContent = `GPS: ${playerLat.toFixed(5)}, ${playerLon.toFixed(5)}  ±${acc}м`;

    if (!gpsReady) {
      gpsReady = true;
      // Allow start once GPS is available
      document.getElementById('start-btn').disabled = false;
      document.getElementById('start-btn').textContent = 'НАЧАТЬ ИГРУ';
    }
  }, err => {
    gpsStatus.textContent = 'GPS: ошибка — ' + err.message;
    document.getElementById('no-gps-warning').style.display = 'block';
  }, opts);
}

// ────── BLOCK MANAGEMENT ──────

/** Colour based on distance */
function blockColor(dist) {
  if (dist < COLLECT_DIST_M * 1.5) return '#ff4444';
  if (dist < 10) return '#ff9900';
  if (dist < 20) return '#ffee00';
  return '#00ccff';
}

function spawnBlock() {
  if (!gpsReady || !playerLat) return;

  const { lat, lon } = randomLatLonOffset(playerLat, playerLon, 5, SPAWN_RADIUS_M);
  const id = ++blockIdSeq;

  // A-Frame entity with AR.js GPS
  const entity = document.createElement('a-entity');
  entity.setAttribute('id', `block-${id}`);
  entity.setAttribute('gps-new-entity-place', `latitude:${lat};longitude:${lon}`);

  // Animated cube inside
  const cube = document.createElement('a-box');
  cube.setAttribute('color', '#00ccff');
  cube.setAttribute('width', '1.5');
  cube.setAttribute('height', '1.5');
  cube.setAttribute('depth', '1.5');
  cube.setAttribute('position', '0 1.5 0');
  cube.setAttribute('opacity', '0.85');
  cube.setAttribute('material', 'emissive:#003366;emissiveIntensity:0.4;metalness:0.3;roughness:0.4');
  cube.setAttribute('animation', 'property:rotation;to:0 360 0;loop:true;dur:3000;easing:linear');
  cube.setAttribute('animation__bounce', 'property:position;from:0 1.2 0;to:0 2.0 0;dir:alternate;loop:true;dur:1200;easing:easeInOutSine');

  // Glow ring
  const ring = document.createElement('a-torus');
  ring.setAttribute('color', '#00ccff');
  ring.setAttribute('radius', '1.0');
  ring.setAttribute('radius-tubular', '0.06');
  ring.setAttribute('position', '0 0.1 0');
  ring.setAttribute('rotation', '90 0 0');
  ring.setAttribute('material', 'emissive:#00ccff;emissiveIntensity:0.7');
  ring.setAttribute('animation__scale', 'property:scale;from:1 1 1;to:1.3 1.3 1.3;dir:alternate;loop:true;dur:900;easing:easeInOutSine');

  // Label
  const label = document.createElement('a-text');
  label.setAttribute('value', `#${id}`);
  label.setAttribute('align', 'center');
  label.setAttribute('color', '#ffffff');
  label.setAttribute('position', '0 3.2 0');
  label.setAttribute('scale', '3 3 3');
  label.setAttribute('look-at', '[gps-new-camera]');

  entity.appendChild(cube);
  entity.appendChild(ring);
  entity.appendChild(label);
  scene.appendChild(entity);

  const blockData = { id, lat, lon, el: entity, cube, ring, collected: false };
  blocks.push(blockData);
  updateBlocksCount();
  return blockData;
}

function removeBlock(blockData) {
  blockData.collected = true;

  // Explosion effect
  const pos = blockData.el.object3D ? blockData.el.object3D.position : null;
  blockData.cube.setAttribute('animation__explode',
    'property:scale;to:3 3 3;dur:200;easing:easeOutQuad');
  blockData.cube.setAttribute('animation__fade',
    'property:material.opacity;to:0;dur:250;easing:easeOutQuad;startEvents:animationcomplete__explode');

  setTimeout(() => {
    if (blockData.el.parentNode) blockData.el.parentNode.removeChild(blockData.el);
    blocks = blocks.filter(b => !b.collected);
    updateBlocksCount();
    // Refill
    if (gameRunning) spawnBlock();
  }, 300);
}

function updateBlocksCount() {
  blocksVal.textContent = blocks.filter(b => !b.collected).length;
}

// ────── COLLISION CHECK ──────
function checkCollisions() {
  if (!gameRunning || !playerLat) return;

  const active = blocks.filter(b => !b.collected);

  active.forEach(b => {
    const d = distMetres(playerLat, playerLon, b.lat, b.lon);

    // Update block color by distance
    const color = blockColor(d);
    b.cube.setAttribute('color', color);
    b.ring.setAttribute('color', color);
    b.cube.setAttribute('material', `emissive:${color};emissiveIntensity:0.4;metalness:0.3;roughness:0.4`);

    if (d <= COLLECT_DIST_M) {
      collectBlock(b);
    }
  });

  updateCompass(active);
}

function collectBlock(b) {
  score++;
  scoreVal.textContent = score;
  removeBlock(b);

  // Flash
  collectFlash.classList.remove('flash');
  void collectFlash.offsetWidth; // reflow
  collectFlash.classList.add('flash');

  // Popup
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = '+1';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 800);

  // Vibrate
  if (navigator.vibrate) navigator.vibrate([30, 15, 50]);
}

// ────── COMPASS INDICATORS ──────
function updateCompass(active) {
  compassBar.innerHTML = '';
  if (!playerLat) return;

  active.slice(0, 8).forEach(b => {
    const d = Math.round(distMetres(playerLat, playerLon, b.lat, b.lon));
    if (d > INDICATOR_DIST) return;

    const bear = Math.round(bearing(playerLat, playerLon, b.lat, b.lon));
    const dir  = bearingToDir(bear);

    const el = document.createElement('div');
    el.className = 'block-indicator';
    el.textContent = `${dir} ${d}м`;
    el.style.borderColor = blockColor(d);
    el.style.color = blockColor(d);
    compassBar.appendChild(el);
  });
}

function bearingToDir(deg) {
  const dirs = ['↑N','↗NE','→E','↘SE','↓S','↙SW','←W','↖NW'];
  return dirs[Math.round(deg / 45) % 8];
}

// ────── GAME FLOW ──────
function startGame() {
  if (!gpsReady) return;
  score    = 0;
  timeLeft = GAME_DURATION;
  blocks   = [];
  scoreVal.textContent = '0';
  timerVal.textContent = GAME_DURATION;
  timerBox.classList.remove('urgent');
  gameRunning = true;

  startOverlay.classList.add('hidden');
  endOverlay.classList.add('hidden');

  // Spawn initial blocks
  for (let i = 0; i < BLOCK_COUNT; i++) {
    setTimeout(() => spawnBlock(), i * 120);
  }

  // Timer
  timerInterval = setInterval(() => {
    timeLeft--;
    timerVal.textContent = timeLeft;
    if (timeLeft <= 10) timerBox.classList.add('urgent');
    if (timeLeft <= 0) endGame();
  }, 1000);

  // Collision polling
  pollInterval = setInterval(checkCollisions, BLOCK_POLL_MS);
}

function endGame() {
  gameRunning = false;
  clearInterval(timerInterval);
  clearInterval(pollInterval);

  // Remove all blocks
  blocks.forEach(b => {
    if (b.el.parentNode) b.el.parentNode.removeChild(b.el);
  });
  blocks = [];

  finalScore.textContent = score;
  const comments = [
    [0,  'Попробуй ещё раз, ты сможешь!'],
    [3,  'Неплохое начало!'],
    [7,  'Хороший результат! 🏃'],
    [12, 'Отлично! Настоящий охотник!'],
    [18, 'Невероятно! Ты чемпион! 🏆'],
  ];
  let comment = comments[0][1];
  for (const [threshold, text] of comments) {
    if (score >= threshold) comment = text;
  }
  endComment.textContent = comment;

  endOverlay.classList.remove('hidden');
}

// ────── BUTTONS ──────
document.getElementById('start-btn').addEventListener('click', () => {
  if (gpsReady) startGame();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  endOverlay.classList.add('hidden');
  startOverlay.classList.remove('hidden');
  // Small delay then start
  setTimeout(startGame, 300);
});

// ────── BOOT ──────
document.getElementById('start-btn').disabled = true;
document.getElementById('start-btn').textContent = 'GPS: ожидание…';
initGPS();

// If GPS never arrives in 8 seconds, let user start anyway with a warning
setTimeout(() => {
  if (!gpsReady) {
    document.getElementById('start-btn').disabled = false;
    document.getElementById('start-btn').textContent = 'НАЧАТЬ БЕЗ GPS';
    // Fallback fake position for testing
    if (!playerLat) {
      playerLat = 50.1109; // Frankfurt
      playerLon = 8.6821;
      gpsReady = true;
    }
  }
}, 8000);
</script>
</body>
</html>
