    init: function () {
        this.score = 0;
        this.blocks = [];
        this.lastSpawn = 0;

        this.camera = document.querySelector('[gps-new-camera]');
        this.scoreText = document.querySelector("#scoreText");

        this.scene = this.el.sceneEl;
        this.sceneReady = false;

        this.originSet = false;
        this.useGPS = false;

        // ЖДЁМ СЦЕНУ
        if (this.scene.hasLoaded) {
            this.onSceneLoaded();
        } else {
            this.scene.addEventListener('loaded', () => this.onSceneLoaded());
        }
    },

    onSceneLoaded: function () {
        this.sceneReady = true;
        console.log("✅ Scene ready");

        document.getElementById('status').innerText = "Сцена готова";
    },

    tick: function (time, delta) {
        if (!this.originSet) return;

        if (time - this.lastSpawn > 3000) {
            this.spawnBlock();
            this.lastSpawn = time;
        }

        let dt = delta / 1000;
        let cam = this.camera.object3D;

        for (let i = this.blocks.length - 1; i >= 0; i--) {
            let b = this.blocks[i];
            let obj = b.el.object3D;

            obj.position.add(b.velocity.clone().multiplyScalar(dt));

            let dist = cam.position.distanceTo(obj.position);

            if (dist < 1.2) {
                this.score = 0;
                this.updateUI("💥 БА-БАХ!");
                this.removeBlock(i);
                continue;
            }

            if (dist < 0.5 || obj.position.z > cam.position.z + 2) {
                this.score++;
                this.updateUI("Очки: " + this.score);
                this.removeBlock(i);
            }
        }
    },

    // ===== GPS → LOCAL METERS =====
    gpsToLocal: function (lat, lon) {
        const R = 6378137;

        let dLat = (lat - this.originLat) * Math.PI / 180;
        let dLon = (lon - this.originLon) * Math.PI / 180;

        let x = dLon * R * Math.cos(this.originLat * Math.PI / 180);
        let z = -dLat * R;

        return { x: x, z: z };
    },

    spawnBlock: function () {
        let cam = this.camera.object3D;

        let pos;

        if (this.useGPS) {
            // ===== GPS BASED SPAWN (НО СТАБИЛЬНЫЙ) =====
            let randLat = this.smoothedLat + (Math.random() - 0.5) * 0.0001;
            let randLon = this.smoothedLon + (Math.random() - 0.5) * 0.0001;

            let local = this.gpsToLocal(randLat, randLon);

            pos = new THREE.Vector3(local.x, 1.5, local.z);
        } else {
            // ===== LOCAL SPAWN =====
            let dir = new THREE.Vector3();
            cam.getWorldDirection(dir);

            let dist = 8 + Math.random() * 4;

            pos = cam.position.clone().add(dir.multiplyScalar(dist));
            pos.x += (Math.random() - 0.5) * 4;
            pos.y = 1.5;
        }

        if (!this.sceneReady) return; 

        let el = document.createElement('a-entity');

        el.setAttribute('geometry', 'primitive: box; width: 1.5; height: 3; depth: 1.5');
        el.setAttribute('material', 'color: red; opacity: 0.8; emissive: #ff0000');

        this.scene.appendChild(el);

        el.object3D.position.copy(pos);

        let velocity = cam.position.clone().sub(pos).normalize().multiplyScalar(3);

        this.blocks.push({
            el: el,
            velocity: velocity
        });
    },

    removeBlock: function (i) {
        let b = this.blocks[i];
        if (b.el.parentNode) b.el.parentNode.removeChild(b.el);
        this.blocks.splice(i, 1);
    },

    updateUI: function (msg) {
        this.scoreText.setAttribute('troika-text', 'value', msg);
    }
});

// ===== START =====
async function startApp() {
    document.getElementById('overlay').style.display = 'none';

    navigator.geolocation.watchPosition(()=>{}, ()=>{}, {
        enableHighAccuracy: true,
        maximumAge: 1000,
        timeout: 10000
    });

    if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try { await DeviceOrientationEvent.requestPermission(); } catch(e){}
    }
}
</script>

<style>
body { margin:0; overflow:hidden; background:#000; }
#overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.9);
    display:flex; align-items:center; justify-content:center;
    color:#fff; z-index:100;
}
#status {
    position:fixed; top:10px; left:10px;
    color:#0f0; background:rgba(0,0,0,0.5);
    padding:5px; font-size:12px;
}
</style>
</head>

<body>

<div id="status">Нажми для старта</div>

<div id="overlay" onclick="startApp()">
    <div>
        <h2>AR Dodge (Stable)</h2>
        <p>Нажми для старта</p>
    </div>
</div>

<a-scene embedded arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
renderer="logarithmicDepthBuffer: true;"
vr-mode-ui="enabled: false">
    <!-- <a-sky color="#111"></a-sky> -->

    <a-entity light="type: ambient; intensity: 0.7"></a-entity>
    <a-entity light="type: directional; intensity: 0.8" position="1 1 1"></a-entity>

    <a-camera gps-new-camera rotation-reader>
        <a-entity id="scoreText"
            position="0 0.8 -2"
            troika-text="value: Очки: 0; align: center; fontSize: 0.15; color: #fff;">
        </a-entity>
    </a-camera>

    <a-entity game-logic></a-entity>
</a-scene>

</body>
