<!DOCTYPE html>
<!-- AR-игра: GPS + камера. Для геолокации нужен HTTPS (или localhost). -->
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AR Mini Game – Собери блоки</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- A-Frame 1.5.0 — совместима с AR.js 3.4.x -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- AR.js Location Based (projected = первая позиция как мировой origin) -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.8/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: system-ui, sans-serif; }
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; padding: 20px; text-align: center; color: #fff;
    }
    .overlay h2 { margin: 0 0 16px; font-size: 1.4rem; }
    .overlay p { margin: 0 0 24px; opacity: 0.9; max-width: 320px; }
    .overlay button {
      padding: 14px 28px; font-size: 1rem; border: none; border-radius: 8px;
      background: #4CAF50; color: #fff; cursor: pointer;
    }
    .overlay button:disabled { background: #666; cursor: not-allowed; }
    .overlay .status { margin-top: 12px; font-size: 0.9rem; opacity: 0.8; }
    .overlay.hidden { display: none; }
    #hud {
      position: fixed; top: 16px; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box;
      color: #fff; font-size: 1.2rem; text-shadow: 0 1px 2px #000; pointer-events: none;
    }
    #game-over-panel {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000; color: #fff; text-align: center; padding: 20px;
    }
    #game-over-panel.visible { display: flex; }
    #game-over-panel h2 { margin: 0 0 12px; }
    #game-over-panel p { margin: 0 0 20px; opacity: 0.9; }
    #game-over-panel button {
      padding: 12px 24px; font-size: 1rem; border: none; border-radius: 8px;
      background: #f44336; color: #fff; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Экран запроса разрешений -->
  <div id="permission-overlay" class="overlay">
    <h2>AR: Собери блоки</h2>
    <p>За 30 секунд собери как можно больше блоков: подходи к ним в реальном мире. Нужны камера и GPS.</p>
    <button id="btn-start" disabled>Начать</button>
    <div class="status" id="permission-status">Запрос разрешений…</div>
  </div>

  <!-- HUD: счёт и таймер -->
  <div id="hud">
    <span id="score-panel">Очки: 0</span>
    <span id="timer-panel">0:30</span>
  </div>

  <!-- Game Over -->
  <div id="game-over-panel">
    <h2>Время вышло!</h2>
    <p id="game-over-text">Собрано блоков: 0</p>
    <button id="btn-restart">Играть снова</button>
  </div>

  <a-scene
    id="ar-scene"
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    style="display: none;"
  >
    <a-assets>
      <a-asset-item id="obstacleModel" src="models/concrete_obstacle.glb"></a-asset-item>
    </a-assets>
    <!-- Яркое освещение для видимости моделей поверх камеры -->
    <a-entity light="type: ambient; intensity: 1.1"></a-entity>
    <a-entity light="type: directional; intensity: 1.2; castShadow: false" position="5 10 5"></a-entity>
    <a-entity light="type: directional; intensity: 0.6; castShadow: false" position="-4 6 4"></a-entity>
    <!-- Камера: Fake world anchor (gps-projected = первая позиция как origin), сглаживание ориентации -->
    <a-camera
      id="ar-camera"
      look-controls-enabled="false"
      arjs-look-controls="smoothingFactor: 0.12"
      gps-projected-camera="gpsMinDistance: 3; positionMinAccuracy: 50; gpsTimeInterval: 500"
      gps-position-smoother="factor: 0.14"
    ></a-camera>

    <!-- Блоки привязаны к координатам, сбор при приближении, таймер 30 с -->
    <a-entity id="ar-collect-game" ar-collect-game></a-entity>
  </a-scene>

  <script>
    (function () {
      const PermissionStatus = { NONE: 0, CAMERA: 1, GPS: 2, BOTH: 3 };
      let permissionState = PermissionStatus.NONE;
      const overlay = document.getElementById('permission-overlay');
      const btnStart = document.getElementById('btn-start');
      const statusEl = document.getElementById('permission-status');
      const arScene = document.getElementById('ar-scene');

      function updateStatus() {
        if (permissionState === PermissionStatus.BOTH) {
          statusEl.textContent = 'Готово. Нажмите «Начать».';
          btnStart.disabled = false;
        } else {
          const parts = [];
          if ((permissionState & PermissionStatus.CAMERA) === 0) parts.push('камера');
          if ((permissionState & PermissionStatus.GPS) === 0) parts.push('GPS');
          statusEl.textContent = 'Ожидание: ' + parts.join(', ');
        }
      }

      function requestCamera() {
        return navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
          .then(function () {
            permissionState |= PermissionStatus.CAMERA;
            updateStatus();
          })
          .catch(function (e) {
            statusEl.textContent = 'Ошибка камеры: ' + (e.message || 'нет доступа');
          });
      }

      function requestGPS() {
        return new Promise(function (resolve) {
          if (!navigator.geolocation) {
            statusEl.textContent = 'Геолокация не поддерживается';
            resolve();
            return;
          }
          navigator.geolocation.getCurrentPosition(
            function () {
              permissionState |= PermissionStatus.GPS;
              updateStatus();
              resolve();
            },
            function (e) {
              statusEl.textContent = 'Ошибка GPS: ' + (e.message || 'нет доступа');
              resolve();
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
          );
        });
      }

      btnStart.addEventListener('click', function () {
        overlay.classList.add('hidden');
        arScene.style.display = 'block';
      });

      Promise.all([requestCamera(), requestGPS()]).then(updateStatus);
      updateStatus();
    })();

    // ——— Компонент: сглаживание позиции камеры по GPS (экспоненциальное сглаживание) ———
    AFRAME.registerComponent('gps-position-smoother', {
      schema: {
        factor: { type: 'number', default: 0.15 }
      },
      init: function () {
        this.smoothedPosition = new THREE.Vector3(0, 0, 0);
        this.initialized = false;
      },
      tick: function () {
        const pos = this.el.object3D.position;
        if (!this.initialized) {
          this.smoothedPosition.set(pos.x, pos.y, pos.z);
          this.initialized = true;
          return;
        }
        const k = this.data.factor;
        this.smoothedPosition.x += (pos.x - this.smoothedPosition.x) * k;
        this.smoothedPosition.y += (pos.y - this.smoothedPosition.y) * k;
        this.smoothedPosition.z += (pos.z - this.smoothedPosition.z) * k;
        this.el.object3D.position.copy(this.smoothedPosition);
      }
    });

    // ——— Игра: блоки привязаны к координатам, игрок ходит и собирает, 30 сек ———
    AFRAME.registerComponent('ar-collect-game', {
      schema: {
        gameDurationMs: { default: 30000 },
        collectRadius: { default: 2.5 },
        numBlocks: { default: 28 },
        spawnRadius: { default: 14 },
        spawnDelayMs: { default: 2000 }
      },
      init: function () {
        this.sceneEl = this.el.sceneEl;
        this.camera = document.querySelector('#ar-camera');
        this.score = 0;
        this.gameOver = false;
        this.blocksSpawned = false;
        this.gameStartTime = null;
        this.firstTickTime = null;
        this.blocks = [];
        for (var i = 0; i < this.data.numBlocks; i++) {
          var wrapper = document.createElement('a-entity');
          wrapper.setAttribute('visible', 'false');
          wrapper.setAttribute('position', '0 -100 0');
          var model = document.createElement('a-entity');
          model.setAttribute('gltf-model', '#obstacleModel');
          model.setAttribute('scale', '2.8 2.8 2.8');
          model.setAttribute('position', '0 0 0');
          wrapper.appendChild(model);
          this.sceneEl.appendChild(wrapper);
          this.blocks.push({ el: wrapper, collected: false });
        }
        this.scoreEl = document.getElementById('score-panel');
        this.timerEl = document.getElementById('timer-panel');
        this.gameOverPanel = document.getElementById('game-over-panel');
        this.gameOverText = document.getElementById('game-over-text');
        document.getElementById('btn-restart').addEventListener('click', function () { location.reload(); });
      },
      spawnBlocksAroundOrigin: function () {
        var rFar = this.data.spawnRadius;
        var rNear = 4;
        var y = 1;
        for (var i = 0; i < this.blocks.length; i++) {
          var b = this.blocks[i];
          var r = i < 10 ? rNear + Math.random() * 3 : rNear + Math.random() * (rFar - rNear);
          var angle = Math.random() * Math.PI * 2;
          var x = Math.cos(angle) * r;
          var z = Math.sin(angle) * r;
          b.el.setAttribute('position', x + ' ' + y + ' ' + z);
          b.el.setAttribute('visible', 'true');
          b.collected = false;
        }
        this.blocksSpawned = true;
        this.gameStartTime = this.sceneEl.time;
      },
      tick: function (time) {
        if (this.gameOver) return;
        if (this.firstTickTime == null) this.firstTickTime = time;
        if (!this.blocksSpawned && (time - this.firstTickTime > this.data.spawnDelayMs)) {
          this.spawnBlocksAroundOrigin();
        }
        if (!this.blocksSpawned) return;
        var elapsed = time - this.gameStartTime;
        var remaining = Math.max(0, (this.data.gameDurationMs / 1000) - (elapsed / 1000));
        var sec = Math.ceil(remaining);
        this.timerEl.textContent = '0:' + (sec < 10 ? '0' : '') + sec;
        if (remaining <= 0) {
          this.gameOver = true;
          this.gameOverText.textContent = 'Собрано блоков: ' + this.score;
          this.gameOverPanel.classList.add('visible');
          return;
        }
        if (!this.camera) return;
        var camPos = this.camera.object3D.position;
        var r2 = this.data.collectRadius * this.data.collectRadius;
        for (var i = 0; i < this.blocks.length; i++) {
          var b = this.blocks[i];
          if (b.collected) continue;
          var p = b.el.object3D.position;
          var dx = p.x - camPos.x, dy = p.y - camPos.y, dz = p.z - camPos.z;
          if (dx * dx + dy * dy + dz * dz < r2) {
            b.collected = true;
            b.el.setAttribute('visible', 'false');
            this.score++;
            this.scoreEl.textContent = 'Очки: ' + this.score;
          }
        }
      }
    });

  </script>
</body>
</html>
