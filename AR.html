<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Block Tap – AR Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Courier New', monospace;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Фикс растяжения видео AR.js ── */
  video {
    position: fixed !important;
    top: 50% !important; left: 50% !important;
    transform: translate(-50%, -50%) !important;
    min-width: 100vw !important; min-height: 100vh !important;
    width: auto !important; height: auto !important;
    object-fit: cover !important;
    z-index: -1 !important;
  }

  a-scene {
    position: fixed !important;
    top: 0 !important; left: 0 !important;
    width: 100% !important; height: 100% !important;
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 9999;
    pointer-events: none;
  }

  #top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
  }

  .hud-box {
    background: rgba(0,255,120,0.12);
    border: 1.5px solid rgba(0,255,120,0.55);
    border-radius: 8px;
    padding: 8px 16px;
    color: #00ff78;
    font-size: 1rem;
    letter-spacing: 0.08em;
    text-shadow: 0 0 8px rgba(0,255,120,0.8);
    min-width: 90px;
    text-align: center;
  }

  .hud-box span {
    display: block;
    font-size: 0.62rem;
    opacity: 0.7;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  #timer-box {
    font-size: 1.5rem;
    background: rgba(255,60,60,0.12);
    border-color: rgba(255,80,80,0.6);
    color: #ff5050;
    text-shadow: 0 0 10px rgba(255,60,60,0.9);
  }

  #timer-box.urgent {
    animation: urgentPulse 0.5s infinite alternate;
    background: rgba(255,30,30,0.25);
    border-color: #ff3030;
  }

  @keyframes urgentPulse {
    from { box-shadow: 0 0 6px rgba(255,50,50,0.4); }
    to   { box-shadow: 0 0 22px rgba(255,50,50,1); }
  }

  /* ── Вспышка при тапе ── */
  #collect-flash {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10000;
    background: radial-gradient(circle, rgba(0,255,120,0.5) 0%, transparent 70%);
    opacity: 0;
  }
  #collect-flash.flash { animation: flashOut 0.3s forwards; }
  @keyframes flashOut { 0% { opacity: 1; } 100% { opacity: 0; } }

  /* ── Попап +1 ── */
  .score-popup {
    position: fixed;
    z-index: 10001;
    left: 50%;
    transform: translateX(-50%);
    color: #00ff78;
    font-size: 2.4rem;
    font-weight: bold;
    text-shadow: 0 0 20px #00ff78, 0 0 4px #fff;
    pointer-events: none;
    animation: popUp 0.7s ease-out forwards;
  }
  @keyframes popUp {
    0%   { top: 50%; opacity: 1; transform: translateX(-50%) scale(0.7); }
    50%  { top: 38%; opacity: 1; transform: translateX(-50%) scale(1.3); }
    100% { top: 26%; opacity: 0; transform: translateX(-50%) scale(1); }
  }

  /* ── Прицел ── */
  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9998;
    pointer-events: none;
    width: 40px; height: 40px;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.6);
    border-radius: 2px;
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
  #crosshair .ring {
    position: absolute; inset: 0;
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 50%;
    animation: ringPulse 2s infinite;
  }
  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50%       { transform: scale(1.3); opacity: 0.1; }
  }

  /* ── Подсказка "тапни" ── */
  #tap-hint {
    position: fixed;
    bottom: 100px;
    left: 50%; transform: translateX(-50%);
    z-index: 9999;
    color: rgba(255,255,255,0.6);
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    pointer-events: none;
    text-align: center;
    animation: hintPulse 2s infinite;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 0.9; }
  }

  /* ── Оверлеи ── */
  .overlay {
    position: fixed; inset: 0;
    z-index: 20000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.9);
    color: #fff;
    text-align: center;
    padding: 28px;
  }
  .overlay.hidden { display: none; }

  .overlay h1 {
    font-size: 2.2rem;
    letter-spacing: 0.14em;
    color: #00ff78;
    text-shadow: 0 0 24px #00ff78;
    margin-bottom: 12px;
  }

  .overlay p {
    font-size: 0.92rem;
    opacity: 0.75;
    max-width: 300px;
    line-height: 1.7;
    margin-bottom: 6px;
  }

  .overlay .big-score {
    font-size: 5rem;
    color: #00ff78;
    text-shadow: 0 0 30px #00ff78;
    margin: 16px 0 4px;
    line-height: 1;
  }

  .overlay .label-small {
    font-size: 0.8rem;
    opacity: 0.5;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .overlay button {
    margin-top: 24px;
    padding: 15px 40px;
    font-size: 1rem;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.12em;
    background: transparent;
    border: 2px solid #00ff78;
    color: #00ff78;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s, color 0.15s;
  }
  .overlay button:active {
    background: #00ff78;
    color: #000;
  }

  /* ── GPS статус (маленький, снизу) ── */
  #gps-status {
    position: fixed;
    bottom: 12px; left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.08em;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div id="top-bar">
    <div class="hud-box">
      <span>Очки</span>
      <strong id="score-val">0</strong>
    </div>
    <div class="hud-box" id="timer-box">
      <span>Время</span>
      <strong id="timer-val">30</strong>
    </div>
    <div class="hud-box">
      <span>Блоки</span>
      <strong id="blocks-val">0</strong>
    </div>
  </div>
</div>

<div id="crosshair"><div class="ring"></div></div>
<div id="collect-flash"></div>
<div id="tap-hint">👆 тапни по блоку</div>
<div id="gps-status">GPS…</div>

<!-- СТАРТ -->
<div id="start-overlay" class="overlay">
  <h1>📦 BLOCK TAP</h1>
  <p>Блоки появляются вокруг тебя прямо в комнате.</p>
  <p><strong>Тапни по блоку</strong> — получи очко.<br>После сбора блок заменяется новым.</p>
  <p>У тебя <strong>30 секунд</strong> — успей тапнуть как можно больше!</p>
  <button id="start-btn">ЖДУ GPS…</button>
</div>

<!-- ФИНИШ -->
<div id="end-overlay" class="overlay hidden">
  <h1>ВРЕМЯ ВЫШЛО</h1>
  <div class="big-score" id="final-score">0</div>
  <div class="label-small">блоков собрано</div>
  <p id="end-comment" style="margin-top:14px; font-size:0.9rem; color:#aaa;"></p>
  <button id="restart-btn">ИГРАТЬ СНОВА</button>
</div>

<!-- A-FRAME СЦЕНА -->
<a-scene
  vr-mode-ui="enabled:false"
  arjs="sourceType:webcam; videoTexture:true; debugUIEnabled:false;"
  renderer="antialias:true; logarithmicDepthBuffer:true;"
  embedded>

  <a-camera
    id="ar-camera"
    gps-new-camera="gpsMinDistance:0.1; gpsTimeInterval:200"
    look-controls="enabled:true"
    arjs-look-controls="smoothingFactor:0.1"
    raycaster="objects:.tappable; far:50"
    cursor="fuse:false; rayOrigin:mouse">
  </a-camera>

</a-scene>

<script>
'use strict';

// ── КОНФИГ ──
const GAME_DURATION = 30;
const BLOCK_COUNT   = 15;   // много блоков в комнате
const SPAWN_MIN_M   = 1.5;  // минимальный радиус (метры)
const SPAWN_MAX_M   = 6;    // максимальный радиус
const BLOCK_SIZE    = 0.35; // размер куба в метрах

// ── СОСТОЯНИЕ ──
let gameRunning = false;
let score       = 0;
let timeLeft    = GAME_DURATION;
let timerInt    = null;
let playerLat   = null;
let playerLon   = null;
let gpsReady    = false;
let blocks      = [];
let blockSeq    = 0;

const scene = document.querySelector('a-scene');

// ── УТИЛИТЫ ──

function randomOffset(lat, lon, minM, maxM) {
  const dist  = minM + Math.random() * (maxM - minM);
  const angle = Math.random() * 2 * Math.PI;
  const dLat  = (dist * Math.cos(angle)) / 111320;
  const dLon  = (dist * Math.sin(angle)) / (111320 * Math.cos(lat * Math.PI / 180));
  return { lat: lat + dLat, lon: lon + dLon };
}

// Случайный яркий цвет для каждого блока
function randomBlockColor() {
  const colors = ['#ff4455','#ff9900','#ffee00','#00ff78','#00ccff','#aa44ff','#ff44cc'];
  return colors[Math.floor(Math.random() * colors.length)];
}

// ── ФИКС ВИДЕО (растяжение) ──
function fixVideoStretch() {
  const apply = () => {
    document.querySelectorAll('video').forEach(v => {
      v.style.cssText = [
        'position:fixed!important',
        'top:50%!important', 'left:50%!important',
        'transform:translate(-50%,-50%)!important',
        'min-width:100vw!important', 'min-height:100vh!important',
        'width:auto!important', 'height:auto!important',
        'object-fit:cover!important',
        'z-index:-1!important'
      ].join(';');
    });
  };
  apply();
  new MutationObserver(apply).observe(document.body, { childList: true, subtree: true });
  setTimeout(apply, 800);
  setTimeout(apply, 2000);
}

// ── GPS ──
function initGPS() {
  if (!navigator.geolocation) { gpsReady = true; useFallbackPos(); return; }

  navigator.geolocation.watchPosition(
    pos => {
      playerLat = pos.coords.latitude;
      playerLon = pos.coords.longitude;
      const acc = Math.round(pos.coords.accuracy);
      document.getElementById('gps-status').textContent = `GPS ±${acc}м`;
      if (!gpsReady) {
        gpsReady = true;
        const btn = document.getElementById('start-btn');
        btn.disabled = false;
        btn.textContent = 'НАЧАТЬ ИГРУ';
      }
    },
    () => { useFallbackPos(); },
    { enableHighAccuracy: true, maximumAge: 1000, timeout: 8000 }
  );

  // Фоллбэк если GPS молчит 8 сек
  setTimeout(() => { if (!gpsReady) useFallbackPos(); }, 8000);
}

function useFallbackPos() {
  if (!playerLat) { playerLat = 50.1109; playerLon = 8.6821; }
  gpsReady = true;
  document.getElementById('gps-status').textContent = 'GPS недоступен';
  const btn = document.getElementById('start-btn');
  btn.disabled = false;
  btn.textContent = 'НАЧАТЬ ИГРУ';
}

// ── БЛОКИ ──

function spawnBlock() {
  if (!playerLat) return;

  const { lat, lon } = randomOffset(playerLat, playerLon, SPAWN_MIN_M, SPAWN_MAX_M);
  const id    = ++blockSeq;
  const color = randomBlockColor();

  const entity = document.createElement('a-entity');
  entity.setAttribute('id', `block-${id}`);
  entity.setAttribute('gps-new-entity-place', `latitude:${lat}; longitude:${lon}`);
  entity.setAttribute('data-block-id', id);

  // Куб — кликабельный
  const cube = document.createElement('a-box');
  cube.setAttribute('class', 'tappable');
  cube.setAttribute('color', color);
  cube.setAttribute('width',  BLOCK_SIZE);
  cube.setAttribute('height', BLOCK_SIZE);
  cube.setAttribute('depth',  BLOCK_SIZE);
  cube.setAttribute('position', '0 0.5 0');
  cube.setAttribute('opacity', '0.92');
  cube.setAttribute('material', `emissive:${color}; emissiveIntensity:0.45; metalness:0.3; roughness:0.35`);
  // Вращение + покачивание
  cube.setAttribute('animation',      `property:rotation; to:0 360 0; loop:true; dur:${2000 + Math.random()*1500}; easing:linear`);
  cube.setAttribute('animation__bob', `property:position; from:0 0.4 0; to:0 0.65 0; dir:alternate; loop:true; dur:${900 + Math.random()*400}; easing:easeInOutSine`);
  cube.setAttribute('data-block-id', id);

  // Тап по кубу
  cube.addEventListener('click', () => onBlockTapped(id));

  // Кольцо-маркер на полу
  const ring = document.createElement('a-torus');
  ring.setAttribute('color', color);
  ring.setAttribute('radius', '0.28');
  ring.setAttribute('radius-tubular', '0.018');
  ring.setAttribute('position', '0 0.04 0');
  ring.setAttribute('rotation', '90 0 0');
  ring.setAttribute('material', `emissive:${color}; emissiveIntensity:0.9`);
  ring.setAttribute('animation__rs', 'property:scale; from:1 1 1; to:1.35 1.35 1.35; dir:alternate; loop:true; dur:700; easing:easeInOutSine');

  entity.appendChild(cube);
  entity.appendChild(ring);
  scene.appendChild(entity);

  blocks.push({ id, lat, lon, el: entity, cube, ring, collected: false });
  updateBlocksUI();
}

function onBlockTapped(id) {
  if (!gameRunning) return;
  const b = blocks.find(x => x.id === id && !x.collected);
  if (!b) return;
  collectBlock(b);
}

function collectBlock(b) {
  b.collected = true;
  score++;
  document.getElementById('score-val').textContent = score;

  // Взрыв блока
  b.cube.setAttribute('animation__explode', 'property:scale; to:4 4 4; dur:160; easing:easeOutQuad');
  b.cube.setAttribute('animation__fade',    'property:material.opacity; to:0; dur:200; easing:easeOutQuad');
  b.ring.setAttribute('animation__rfade',   'property:material.opacity; to:0; dur:180');

  setTimeout(() => {
    if (b.el.parentNode) b.el.parentNode.removeChild(b.el);
    blocks = blocks.filter(x => !x.collected);
    updateBlocksUI();
    if (gameRunning) spawnBlock(); // сразу заменяем новым
  }, 220);

  // Вспышка экрана
  const flash = document.getElementById('collect-flash');
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');

  // Попап +1
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = '+1';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 700);

  if (navigator.vibrate) navigator.vibrate([20, 8, 35]);
}

function updateBlocksUI() {
  document.getElementById('blocks-val').textContent = blocks.filter(b => !b.collected).length;
}

// ── ИГРОВОЙ ПОТОК ──

function startGame() {
  score    = 0;
  timeLeft = GAME_DURATION;
  blocks   = [];
  document.getElementById('score-val').textContent  = '0';
  document.getElementById('timer-val').textContent  = GAME_DURATION;
  document.getElementById('blocks-val').textContent = '0';
  document.getElementById('timer-box').classList.remove('urgent');
  gameRunning = true;

  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');

  // Спавним все блоки с небольшой задержкой между ними
  for (let i = 0; i < BLOCK_COUNT; i++) {
    setTimeout(() => spawnBlock(), i * 100);
  }

  timerInt = setInterval(() => {
    timeLeft--;
    document.getElementById('timer-val').textContent = timeLeft;
    if (timeLeft <= 10) document.getElementById('timer-box').classList.add('urgent');
    if (timeLeft <= 0)  endGame();
  }, 1000);
}

function endGame() {
  gameRunning = false;
  clearInterval(timerInt);

  blocks.forEach(b => { if (b.el.parentNode) b.el.parentNode.removeChild(b.el); });
  blocks = [];

  document.getElementById('final-score').textContent = score;
  document.getElementById('tap-hint').style.display = 'none';

  const table = [
    [0,  'Попробуй снова — блоки ждут!'],
    [4,  'Неплохое начало! 👀'],
    [8,  'Хорошо! Пальцы быстрые 👆'],
    [13, 'Отлично! Снайпер по блокам!'],
    [18, 'Невероятно! Ты чемпион! 🏆'],
  ];
  let comment = table[0][1];
  for (const [t, txt] of table) { if (score >= t) comment = txt; }
  document.getElementById('end-comment').textContent = comment;
  document.getElementById('end-overlay').classList.remove('hidden');
}

// ── КНОПКИ ──
document.getElementById('start-btn').disabled = true;
document.getElementById('start-btn').addEventListener('click', () => {
  if (gpsReady) startGame();
});
document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('tap-hint').style.display = '';
  document.getElementById('end-overlay').classList.add('hidden');
  setTimeout(startGame, 150);
});

// ── СТАРТ ──
document.addEventListener('DOMContentLoaded', fixVideoStretch);
initGPS();
</script>
</body>
</html>
